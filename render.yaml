services:
  - type: web
    name: levelearn-backend
    runtime: node
    buildCommand: npm install && npx prisma generate
    startCommand: npm start
    plan: free
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: GOOGLE_AI_API_KEY
        sync: false
      - key: LEVELY_LLM_MODEL
        sync: false
      - key: LEVELY_LLM_TEMPERATURE
        value: "0.3"
      - key: LEVELY_LLM_TOP_P
        value: "0.9"
      - key: LEVELY_LLM_TIMEOUT_MS
        value: "30000"
      - key: LEVELY_CHAT_IMAGE_DOWNLOAD_TIMEOUT_MS
        value: "1200"
      - key: LEVELY_LLM_WARMUP_INTERVAL_MS
        value: "600000"
      - key: LEVELY_LLM_WARMUP_INITIAL_DELAY_MS
        value: "300000"
      - key: LEVELY_LLM_WARMUP_PROMPT
        value: "ping"